name: Update Notion on push
on:
  push:
    branches: ["*"]

jobs:
  update-notion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 5

      - name: Push commit summary to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          COMMITS=$(git log -5 --pretty=format:"• %s (%ar)" | jq -Rs .)
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          curl -s -X PATCH "https://api.notion.com/v1/pages/$NOTION_PAGE_ID" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{
              \"properties\": {
                \"title\": {
                  \"title\": [{
                    \"text\": { \"content\": \"GitHub Activity — updated $DATE\" }
                  }]
                }
              }
            }"

          curl -s -X POST "https://api.notion.com/v1/blocks/$NOTION_PAGE_ID/children" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{
              \"children\": [{
                \"type\": \"paragraph\",
                \"paragraph\": {
                  \"rich_text\": [{
                    \"type\": \"text\",
                    \"text\": { \"content\": \"Repo: $REPO | Branch: $BRANCH\n$(echo $COMMITS | tr -d '\"')\" }
                  }]
                }
              }]
            }"
